version: "3.9"

networks:
  finforge-net:
    driver: bridge
  docker-services_default:
    external: true

services:
  finforge-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: finforge-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./api:/app
      - ./secrets:/secrets
    networks:
      - finforge-net
      - docker-services_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health", "-H", "X-API-Key: ${API_KEY}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  finforge-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${API_KEY}
    container_name: finforge-ui
    ports:
      - "3003:80"
    depends_on:
      - finforge-api
    networks:
      - finforge-net
    restart: unless-stopped

  finforge-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: finforge-tunnel
    command: tunnel --no-autoupdate run
    env_file:
      - .env
    depends_on:
      - finforge-api
    networks:
      - finforge-net
    restart: unless-stopped

  finforge-cron:
    build:
      context: ./cron
      dockerfile: Dockerfile
    container_name: finforge-cron
    env_file:
      - .env
    volumes:
      - ./secrets:/secrets
    depends_on:
      - finforge-api
    networks:
      - finforge-net
      - docker-services_default
    restart: unless-stopped
